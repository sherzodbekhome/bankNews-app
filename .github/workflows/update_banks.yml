name: Update banks_data.json

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install aiohttp beautifulsoup4 lxml

      - name: Fetch bank.uz rates
        run: python fetch_banks.py

      - name: Commit banks_data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add banks_data.json
          git diff --cached --quiet || git commit -m "chore: update banks_data.json [$(date -u '+%H:%M UTC')]"
          git push
