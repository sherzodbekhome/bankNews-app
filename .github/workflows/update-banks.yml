name: Update Bank Rates

on:
  schedule:
    # Har kuni soat 04:00, 10:00, 16:00 UTC da ishga tushadi
    - cron: '0 4,10,16 * * *'
  workflow_dispatch:  # Qo'lda ishga tushirish uchun

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install aiohttp beautifulsoup4 lxml

      - name: Run fetch script
        working-directory: backend
        run: python scripts/fetch_banks.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/banks_data.json
          if git diff --staged --quiet; then
            echo "O'zgarish yo'q, commit shart emas"
          else
            git commit -m "chore: update bank rates [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
