<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Bank News</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

/* ═══ DARK THEME (default) ═══ */
:root{
  --bg:#07090f;
  --bg2:#0c1018;
  --surface:#111520;
  --card:#151b28;
  --card2:#1a2133;
  --border:#1f2d42;
  --border2:#2a3d58;
  --gold:#d4a843;
  --gold2:#f0c96a;
  --gold3:#fae09a;
  --green:#2ecc71;
  --red:#e74c3c;
  --text:#e2eaf8;
  --text2:#6e8aac;
  --text3:#354d6a;
  --shadow:0 8px 32px rgba(0,0,0,0.5);
  --shadow2:0 2px 12px rgba(0,0,0,0.3);
}

/* ═══ LIGHT THEME ═══ */
[data-theme=light]{
  --bg:#f5f7fc;
  --bg2:#eaeff8;
  --surface:#ffffff;
  --card:#ffffff;
  --card2:#f0f4fb;
  --border:#dde4f0;
  --border2:#c8d4e8;
  --gold:#b8891a;
  --gold2:#9a6e0a;
  --gold3:#7a5200;
  --green:#1a8a45;
  --red:#c0392b;
  --text:#0d1a30;
  --text2:#4a6080;
  --text3:#90a8c8;
  --shadow:0 4px 20px rgba(0,0,30,0.08);
  --shadow2:0 2px 8px rgba(0,0,30,0.05);
}

body{
  background:var(--bg);color:var(--text);
  font-family:'Inter',sans-serif;
  min-height:100vh;padding-bottom:72px;
  overflow-x:hidden;transition:background .3s,color .3s;
}

/* ═══ HEADER ═══ */
.hdr{
  position:sticky;top:0;z-index:300;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  padding:0 16px;
}
.hdr-top{
  display:flex;align-items:center;
  justify-content:space-between;
  padding:11px 0 8px;
}
.brand{display:flex;align-items:center;gap:10px}
.brand-ico{
  width:40px;height:40px;border-radius:10px;
  background:#d4a843;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 18px rgba(212,168,67,.45);
  overflow:hidden;flex-shrink:0;
}
.brand-txt .name{
  font-family:'Inter',sans-serif;
  font-size:20px;font-weight:900;
  background:linear-gradient(135deg,var(--gold) 0%,var(--gold3) 50%,var(--gold) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:1.5px;line-height:1;
}
.brand-txt .sub{
  font-size:8px;font-weight:600;color:var(--text3);
  letter-spacing:3px;text-transform:uppercase;margin-top:2px;
}
.hdr-actions{display:flex;align-items:center;gap:6px}
.icon-btn{
  width:32px;height:32px;border:1px solid var(--border);
  background:var(--surface);border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;cursor:pointer;transition:all .15s;color:var(--text2);
}
.icon-btn:active{transform:scale(.9);background:var(--gold);color:#000;border-color:var(--gold)}
.icon-btn.spin{animation:rot .7s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
.clock{
  font-family:'JetBrains Mono',monospace;font-size:10px;
  color:var(--text3);padding:4px 9px;
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
}

/* Lang pills */
.lang-bar{
  display:flex;gap:5px;padding-bottom:10px;
}
.lbtn{
  font-size:11px;font-weight:600;
  padding:4px 11px;border-radius:20px;
  border:1px solid var(--border);
  background:var(--surface);color:var(--text2);
  cursor:pointer;transition:all .15s;
}
.lbtn.on{background:var(--gold);color:#000;border-color:var(--gold);font-weight:700}

/* ═══ TABS (hidden — only bottom nav used) ═══ */
.tabs{display:none}

/* ═══ CONTENT ═══ */
.body{padding:13px 13px 0;position:relative;z-index:1}
.sec{display:none}
.sec.on{display:block;animation:up .25s ease}
@keyframes up{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}

/* ═══ CARDS ═══ */
.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;margin-bottom:12px;overflow:hidden;
  box-shadow:var(--shadow2);
}
.ch{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 15px;border-bottom:1px solid var(--border);
}
.ct{
  font-size:10px;font-weight:700;
  color:var(--text2);
  text-transform:uppercase;
  letter-spacing:2px;
  font-family:'Inter',sans-serif;
}

.ctag{
  font-family:'JetBrains Mono',monospace;font-size:9px;
  color:var(--gold);background:rgba(212,168,67,.1);
  border:1px solid rgba(212,168,67,.2);border-radius:4px;padding:2px 7px;
}
.clive{
  display:flex;align-items:center;gap:4px;
  font-family:'JetBrains Mono',monospace;font-size:9px;
  color:var(--green);background:rgba(46,204,113,.1);
  border:1px solid rgba(46,204,113,.2);border-radius:4px;padding:2px 7px;
}
.dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ═══ CHIP ROW ═══ */
.chips{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;margin-bottom:12px;padding-bottom:2px}
.chips::-webkit-scrollbar{display:none}
.chip{
  background:var(--card);border:1px solid var(--border);
  border-radius:11px;padding:9px 12px;min-width:fit-content;
  box-shadow:var(--shadow2);
}
.ch-sym{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:1px;text-transform:uppercase}
.ch-val{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;color:var(--text);margin-top:3px;letter-spacing:-0.5px}
.ch-d{font-family:'JetBrains Mono',monospace;font-size:10px;margin-top:2px}

/* ═══ RATE ROW ═══ */
.rr{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 15px;border-bottom:1px solid var(--border);
  transition:background .12s;
}
.rr:last-child{border-bottom:none}
.rr:active{background:rgba(212,168,67,.04)}
.rl{display:flex;align-items:center;gap:11px}
.flag{
  width:38px;height:38px;border-radius:50%;
  background:var(--surface);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;font-size:20px;
}
.rcode{font-family:'JetBrains Mono',monospace;font-size:13.5px;font-weight:600;color:var(--text);letter-spacing:.5px}
.rname{font-size:10px;color:var(--text3);margin-top:2px}
.rright{text-align:right}
.rv{font-family:'JetBrains Mono',monospace;font-size:14.5px;font-weight:600;color:var(--text);letter-spacing:-0.3px}
.rv small{font-size:10px;color:var(--text3);font-weight:400}
.rd{
  font-family:'JetBrains Mono',monospace;font-size:10px;
  margin-top:3px;display:inline-flex;align-items:center;gap:2px;
  padding:2px 6px;border-radius:4px;
}
.rd.up{color:var(--green);background:rgba(46,204,113,.1)}
.rd.dn{color:var(--red);background:rgba(231,76,60,.1)}
.rd.nt{color:var(--text3);background:var(--surface)}

/* Bank rates table */
.bank-table{width:100%;border-collapse:collapse}
.bank-table th{
  font-size:9px;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:1px;
  padding:8px 10px;border-bottom:1px solid var(--border);
  background:var(--bg2);text-align:right;
}
.bank-table th:first-child{text-align:left}
.bank-table td{
  font-family:'JetBrains Mono',monospace;
  font-size:12.5px;color:var(--text);
  padding:9px 10px;border-bottom:1px solid var(--border);
  text-align:right;
}
.bank-table td:first-child{font-size:11.5px;color:var(--text2);text-align:left;font-family:'Inter',sans-serif}
.bank-table tr:last-child td{border-bottom:none}
.bank-table tr:active td{background:rgba(212,168,67,.04)}
.buy{color:var(--green)}.sell{color:var(--red)}

/* Currency sub-tabs */
.sub-tabs{display:flex;gap:6px;padding:10px 15px;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.sub-tabs::-webkit-scrollbar{display:none}
.stab{
  font-size:11px;font-weight:600;padding:5px 12px;
  border-radius:20px;border:1px solid var(--border);
  background:var(--surface);color:var(--text2);
  cursor:pointer;white-space:nowrap;transition:all .15s;
}
.stab.on{background:var(--gold);color:#000;border-color:var(--gold)}

/* ═══ CRYPTO GRID ═══ */
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:11px}
.ctile{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:12px 11px;position:relative;overflow:hidden;
  transition:border-color .2s;
}
.ctile::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  opacity:0;transition:opacity .2s;
}
.ctile:active{border-color:var(--gold)}
.ctile:active::before{opacity:1}
.cico,.mico{width:36px;height:36px;border-radius:50%;overflow:hidden;margin-bottom:8px;flex-shrink:0}
.cico img{width:36px;height:36px;border-radius:50%;display:block}
.mico svg{width:36px;height:36px;display:block}
.csym{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--text3);letter-spacing:1px}
.cp{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;color:var(--text);margin:4px 0 2px}
.cuzs{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--text3)}
.cch{
  display:inline-block;margin-top:6px;
  font-family:'JetBrains Mono',monospace;font-size:10px;
  padding:2px 7px;border-radius:4px;
}
.cch.up{background:rgba(46,204,113,.12);color:var(--green)}
.cch.dn{background:rgba(231,76,60,.12);color:var(--red)}

/* ═══ METALS ═══ */
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:11px}
.mtile{
  border:1px solid var(--border);
  border-radius:12px;padding:12px 11px;position:relative;overflow:hidden;
  transition:border-color .2s, transform .15s;
}
.mtile:active{transform:scale(.97)}

/* Har bir metal uchun o'ziga xos gradient fon */
.mtile.g{
  background:
    radial-gradient(ellipse at 20% 20%, rgba(212,168,67,.13) 0%, transparent 65%),
    radial-gradient(ellipse at 80% 80%, rgba(212,168,67,.07) 0%, transparent 55%),
    var(--surface);
  border-color:rgba(212,168,67,.22);
}
.mtile.s{
  background:
    radial-gradient(ellipse at 20% 20%, rgba(170,184,200,.11) 0%, transparent 65%),
    radial-gradient(ellipse at 80% 80%, rgba(170,184,200,.06) 0%, transparent 55%),
    var(--surface);
  border-color:rgba(170,184,200,.2);
}
.mtile.p{
  background:
    radial-gradient(ellipse at 20% 20%, rgba(142,168,192,.11) 0%, transparent 65%),
    radial-gradient(ellipse at 80% 80%, rgba(142,168,192,.06) 0%, transparent 55%),
    var(--surface);
  border-color:rgba(142,168,192,.2);
}
.mtile.pd{
  background:
    radial-gradient(ellipse at 20% 20%, rgba(176,144,168,.11) 0%, transparent 65%),
    radial-gradient(ellipse at 80% 80%, rgba(176,144,168,.06) 0%, transparent 55%),
    var(--surface);
  border-color:rgba(176,144,168,.2);
}

/* Light theme uchun ham gradient */
[data-theme=light] .mtile.g{
  background:
    radial-gradient(ellipse at 20% 20%, rgba(212,168,67,.1) 0%, transparent 65%),
    radial-gradient(ellipse at 80% 80%, rgba(212,168,67,.05) 0%, transparent 55%),
    #fff;
  border-color:rgba(212,168,67,.3);
}
[data-theme=light] .mtile.s{
  background:
    radial-gradient(ellipse at 20% 20%, rgba(150,165,185,.1) 0%, transparent 65%),
    #fff;
  border-color:rgba(150,165,185,.3);
}
[data-theme=light] .mtile.p{
  background:
    radial-gradient(ellipse at 20% 20%, rgba(120,150,180,.1) 0%, transparent 65%),
    #fff;
  border-color:rgba(120,150,180,.3);
}
[data-theme=light] .mtile.pd{
  background:
    radial-gradient(ellipse at 20% 20%, rgba(160,120,155,.1) 0%, transparent 65%),
    #fff;
  border-color:rgba(160,120,155,.3);
}

/* Yuqori chiziq — rangga mos -->*/
.mtile::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  opacity:.9;
}
.mtile.g::before{background:linear-gradient(90deg,transparent,#d4a843,transparent)}
.mtile.s::before{background:linear-gradient(90deg,transparent,#aab8c8,transparent)}
.mtile.p::before{background:linear-gradient(90deg,transparent,#8ea8c0,transparent)}
.mtile.pd::before{background:linear-gradient(90deg,transparent,#b090a8,transparent)}

/* Yashirin yaltirash effekti (shimmer) -->*/
.mtile::after{
  content:'';position:absolute;
  top:-60%;left:-60%;width:60%;height:60%;
  background:radial-gradient(circle, rgba(255,255,255,.06) 0%, transparent 70%);
  border-radius:50%;pointer-events:none;
}
.msym{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--text3);letter-spacing:1px}
.mp{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;color:var(--text);margin:4px 0 2px}
.muzs{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--text3)}
.mgram{font-family:'JetBrains Mono',monospace;font-size:8.5px;color:var(--text3);margin-top:2px}
.mch{
  display:inline-block;margin-top:6px;
  font-family:'JetBrains Mono',monospace;font-size:10px;
  padding:2px 7px;border-radius:4px;
}
.mch.up{background:rgba(46,204,113,.12);color:var(--green)}
.mch.dn{background:rgba(231,76,60,.12);color:var(--red)}
.mch.nt{background:var(--surface);color:var(--text3)}

/* ── Unit toggle (g / oz) ── */
.unit-toggle{
  display:flex;gap:6px;
  padding:10px 12px 0;
}
.utab{
  flex:1;
  font-family:'Inter',sans-serif;
  font-size:12px;font-weight:600;
  padding:8px 0;border-radius:9px;
  border:1px solid var(--border);
  background:var(--surface);
  color:var(--text3);
  cursor:pointer;transition:all .2s;
  text-align:center;
  letter-spacing:.3px;
}
.utab.on{
  background:var(--gold);
  color:#000;
  border-color:var(--gold);
  box-shadow:0 2px 14px rgba(212,168,67,.28);
}
.utab:not(.on):active{background:var(--card2);color:var(--text)}
/* Animatsiya */
@keyframes fadeNum{
  0%{opacity:0;transform:translateY(-5px)}
  100%{opacity:1;transform:translateY(0)}
}
.mp,.muzs{animation:none}
.mp.anim,.muzs.anim{animation:fadeNum .2s ease}
/* Unit label inline */
.ulbl{
  font-family:'Inter',sans-serif;
  font-size:9px;font-weight:600;
  color:var(--text3);
  text-transform:uppercase;
  letter-spacing:1px;
  margin-left:3px;
}

/* ═══ CALCULATOR ═══ */
.ccard{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:12px}
.cc-top,.cc-mid{padding:14px 15px;border-bottom:1px solid var(--border)}
.cc-bot{padding:14px 15px}
.flbl{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
.amtinput{
  width:100%;background:var(--surface);border:1px solid var(--border2);
  border-radius:10px;padding:13px 15px;
  font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;
  color:var(--text);outline:none;transition:border-color .2s;
}
.amtinput:focus{border-color:var(--gold)}
.qrow{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
.qb{
  background:var(--surface);border:1px solid var(--border);
  border-radius:6px;padding:5px 10px;
  font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);
  cursor:pointer;transition:all .15s;
}
.qb:active{background:var(--gold);color:#000;border-color:var(--gold)}
.crow{display:grid;grid-template-columns:1fr 40px 1fr;gap:8px;align-items:center}
.csel{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:10px;padding:10px 11px;
  color:var(--text);font-size:15px;font-weight:500;
  outline:none;width:100%;cursor:pointer;
  transition:border-color .2s;
  -webkit-appearance:none;
  appearance:none;
}
.csel:focus{border-color:var(--gold)}
.swpbtn{
  width:40px;height:40px;background:var(--surface);
  border:1px solid var(--border2);border-radius:50%;
  color:var(--gold);font-size:17px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto;transition:all .2s;
}
.swpbtn:active{background:var(--gold);color:#000;transform:rotate(180deg)}
.calcbtn{
  width:100%;background:linear-gradient(135deg,#d4a843,#8b6010);
  border:none;border-radius:11px;padding:14px;
  font-family:'Inter',sans-serif;font-size:16px;font-weight:700;
  color:#fff;cursor:pointer;letter-spacing:1px;
  box-shadow:0 4px 20px rgba(212,168,67,.25);transition:all .2s;
}
.calcbtn:active{transform:scale(.98)}
.rescard{
  background:var(--card);border:1px solid var(--border);
  border-top:2px solid var(--gold);border-radius:14px;
  padding:18px 15px;display:none;animation:up .25s ease;margin-bottom:12px;
}
.rescard.on{display:block}
.reslbl{font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px}
.resfrom{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text2);margin-bottom:10px}
.resto{font-family:'Inter',sans-serif;font-size:30px;font-weight:700;color:var(--gold2);margin-bottom:5px}
.resrate{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3)}
.resdiv{height:1px;background:var(--border);margin:10px 0}

/* ═══ LOADING ═══ */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;gap:14px}
.spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:rot .7s linear infinite}
.ltxt{font-size:12px;color:var(--text3)}

/* ═══ BOTTOM NAV ═══ */
.bnav{
  position:fixed;bottom:0;left:0;right:0;z-index:300;
  background:var(--bg);border-top:1px solid var(--border);
  display:flex;padding:7px 0 10px;
  backdrop-filter:blur(20px);
}
.nb{
  flex:1;border:none;background:none;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:5px 4px;cursor:pointer;color:var(--text3);
  font-size:9px;font-weight:700;font-family:'Inter',sans-serif;
  text-transform:uppercase;letter-spacing:.5px;transition:color .2s;
}
.nb em{font-size:18px;font-style:normal;display:block;line-height:1}
.nb svg{width:24px;height:24px;display:block;margin:0 auto;transition:all .2s}

.nb.on{color:var(--gold2)}
.ndot{width:3px;height:3px;border-radius:50%;background:var(--gold);margin:1px auto 0;opacity:0;transition:opacity .2s}
.nb.on .ndot{opacity:1}
</style>
</head>
<body data-theme="dark">

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-top">
    <div class="brand">
      <div class="brand-ico">
        <svg viewBox="0 0 40 40" width="40" height="40" xmlns="http://www.w3.org/2000/svg">
          <rect width="40" height="40" fill="#d4a843"/>
          <!-- Roof/pediment -->
          <polygon points="4,16 20,5 36,16" fill="#1a1200"/>
          <rect x="6" y="15" width="28" height="2.5" fill="#1a1200"/>
          <!-- Columns -->
          <rect x="7"  y="17.5" width="3.5" height="12" fill="#1a1200"/>
          <rect x="12.5" y="17.5" width="3.5" height="12" fill="#1a1200"/>
          <rect x="18" y="17.5" width="3.5" height="12" fill="#1a1200"/>
          <rect x="23.5" y="17.5" width="3.5" height="12" fill="#1a1200"/>
          <rect x="29" y="17.5" width="3.5" height="12" fill="#1a1200"/>
          <!-- Dollar coin -->
          <circle cx="20" cy="22" r="4" fill="#d4a843" stroke="#1a1200" stroke-width="1"/>
          <text x="20" y="25.5" text-anchor="middle" font-size="5.5" font-weight="900" fill="#1a1200" font-family="serif">$</text>
          <!-- Base -->
          <rect x="4" y="29.5" width="32" height="2.5" rx="1" fill="#1a1200"/>
          <rect x="6" y="32" width="28" height="1.5" rx="0.5" fill="#1a1200"/>
        </svg>
      </div>

async function loadCBU(){
  try{
    // Avval Vercel API dan sinab ko'r
    let rates={};
    try{
      const r=await fetch(`${API}/api/rates`);
      const d=await r.json();
      if(d.ok && d.data) rates=d.data;

      const d=await r.json();
      ['USD','EUR','RUB','GBP','CNY','KZT','TRY','JPY','CHF'].forEach(c=>{
        const f=d.find(x=>x.Ccy===c);
        if(f)rates[c]={rate:+f.Rate,diff:+(f.Diff||0)};
      });
    }
    CBU=rates;
    if(CBU.USD)USD_UZS=CBU.USD.rate;
    buildStaticBanks(); // Bank fallback yangilash
    // Bank kurslarini ham yuklash
    try{
      const rb=await fetch(`${API}/api/banks`);
      const db=await rb.json();
      if(db.ok && db.data) BANK_RATES=db.data;
      else BANK_RATES=STATIC_BANKS;
    }catch(_){ BANK_RATES=STATIC_BANKS; }
    renderCBU();
  }catch(e){
    document.getElementById('v-load').innerHTML=`<div class="ltxt">❌ ${tx('err')}</div>`;
  }
}

// ── CRYPTO ──
async function loadCrypto(){
  try{
    let crypto={};

    // Binance public API — CORS yo'q, bepul, tez
    // Har bir juftlik alohida: BTCUSDT, ETHUSDT va h.k.
    const BINANCE_PAIRS={
      BTC: 'BTCUSDT', ETH: 'ETHUSDT', BNB: 'BNBUSDT',
      SOL: 'SOLUSDT', TON: 'TONUSDT',
    };

    // 1. Binance ticker API — hammani birda olish
    try{
      const _ac=new AbortController(),_tid=setTimeout(()=>_ac.abort(),6000);
      const symbols=JSON.stringify(Object.values(BINANCE_PAIRS));
      const r=await fetch(
        `https://api.binance.com/api/v3/ticker/24hr?symbols=${encodeURIComponent(symbols)}`,
        {signal:_ac.signal}
      );
      clearTimeout(_tid);
      const arr=await r.json();
      if(Array.isArray(arr)){
        arr.forEach(t=>{
          const sym=Object.keys(BINANCE_PAIRS).find(k=>BINANCE_PAIRS[k]===t.symbol);
          if(sym){
            const usd=parseFloat(t.lastPrice)||0;
            const chg=parseFloat(t.priceChangePercent)||0;
            if(usd>0) crypto[sym]={usd,change:chg,uzs:usd*USD_UZS};
          }
        });
      }
    }catch(_){}

    // 2. USDT = 1$ (Binance da USDT pari yo'q)
    if(!crypto.USDT) crypto.USDT={usd:1.0,change:0.01,uzs:1.0*USD_UZS};

    // 3. Agar Binance ishlamasa — Vercel proxy
    if(Object.keys(crypto).length < 3){
      try{
        const _ac=new AbortController(),_tid=setTimeout(()=>_ac.abort(),6000);
        const r=await fetch(`${API}/api/crypto`,{signal:_ac.signal});
        clearTimeout(_tid);
        const d=await r.json();
        if(d.ok && d.data && Object.keys(d.data).length>=3){
          Object.entries(d.data).forEach(([sym,v])=>{
            if(!crypto[sym]) crypto[sym]={usd:v.usd,change:v.change_24h||0,uzs:v.usd*USD_UZS};
          });
        }
      }catch(_){}
    }

    // 4. CoinGecko fallback
    if(Object.keys(crypto).length < 3){
      try{
        const ids='bitcoin,ethereum,the-open-network,binancecoin,solana,tether';
        const _ac=new AbortController(),_tid=setTimeout(()=>_ac.abort(),6000);
        const r=await fetch(
          `https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`,
          {signal:_ac.signal}
        );
        clearTimeout(_tid);
        const d=await r.json();
        const map={bitcoin:'BTC',ethereum:'ETH','the-open-network':'TON',binancecoin:'BNB',solana:'SOL',tether:'USDT'};
        Object.entries(map).forEach(([id,sym])=>{
          if(d[id]&&!crypto[sym]) crypto[sym]={usd:d[id].usd,change:d[id].usd_24h_change||0,uzs:d[id].usd*USD_UZS};
        });
      }catch(_){}
    }

    if(Object.keys(crypto).length < 2) throw new Error('all sources failed');
    CRYPTO=crypto;
    renderCrypto();
  }catch(e){
    // Static fallback — so'nggi narxlar
    CRYPTO={
      BTC: {usd:103500,change:1.2, uzs:103500*USD_UZS},
      ETH: {usd:2480,  change:-0.5,uzs:2480*USD_UZS},
      TON: {usd:3.15,  change:0.8, uzs:3.15*USD_UZS},
      USDT:{usd:1.0,   change:0.01,uzs:USD_UZS},
      SOL: {usd:168,   change:1.9, uzs:168*USD_UZS},
      BNB: {usd:645,   change:-0.9,uzs:645*USD_UZS},
    };
    renderCrypto();
  }
}

// ── METALS ──
async function loadMetals(){
  // Har bir metalni alohida manbadan olish
  const METAL_SOURCES = {
    XAU: [
      // CoinGecko - pax-gold (1 PAX Gold = 1 troy oz oltin)
      {url:'https://api.coingecko.com/api/v3/simple/price?ids=pax-gold&vs_currencies=usd&include_24hr_change=true',
       parse: d => d['pax-gold']?.usd ? {usd:d['pax-gold'].usd, change:d['pax-gold'].usd_24h_change||0} : null},
    ],
    XAG: [
      // Frankfurter (ECB data) - kumush yo'q, metals-api.com bepul emas
      // Fallback: CoinGecko silver token (SLVR) yoki static
      {url:'https://api.coingecko.com/api/v3/simple/price?ids=silver&vs_currencies=usd&include_24hr_change=true',
       parse: d => d['silver']?.usd ? {usd:d['silver'].usd, change:d['silver'].usd_24h_change||0} : null},
      // silver bepul APIsida yo'q bo'lsa - spot narx (taxminiy)
      {url:'https://api.coingecko.com/api/v3/simple/price?ids=mirrored-silver&vs_currencies=usd&include_24hr_change=true',
       parse: d => d['mirrored-silver']?.usd ? {usd:d['mirrored-silver'].usd, change:d['mirrored-silver'].usd_24h_change||0} : null},
    ],
    XPT: [
      {url:'https://api.coingecko.com/api/v3/simple/price?ids=platinum&vs_currencies=usd&include_24hr_change=true',
       parse: d => d['platinum']?.usd ? {usd:d['platinum'].usd, change:d['platinum'].usd_24h_change||0} : null},
    ],
    XPD: [
      {url:'https://api.coingecko.com/api/v3/simple/price?ids=palladium&vs_currencies=usd&include_24hr_change=true',
       parse: d => d['palladium']?.usd ? {usd:d['palladium'].usd, change:d['palladium'].usd_24h_change||0} : null},
    ],
  };

  // Real spot narxlar (yangilangan 2025-yil ma'lumotlari) - CoinGecko qaytarmasa
  const SPOT_FALLBACK = {
    XAU: {usd:3320,  change:0.4},
    XAG: {usd:33.2,  change:-0.3},
    XPT: {usd:1050,  change:0.6},
    XPD: {usd:1020,  change:-0.1},
  };

  let metals = {};

  // 1. Vercel API dan hammani birda sinab ko'r
  try{
    const _ac=new AbortController(),_tid=setTimeout(()=>_ac.abort(),6000);
    const r=await fetch(`${API}/api/metals`,{signal:_ac.signal});
    clearTimeout(_tid);
    const d=await r.json();
    if(d.ok && d.data && Object.keys(d.data).length>=2){
      Object.entries(d.data).forEach(([sym,v])=>{
        metals[sym]={usd:v.usd,change:v.change_24h||0,uzs:v.usd*USD_UZS,gram:v.usd/31.1035};
      });
    }
  }catch(_){}

  // 2. Har bir metalni alohida fetch
  for(const [sym, sources] of Object.entries(METAL_SOURCES)){
    if(metals[sym]) continue; // Allaqachon bor
    let found = false;
    for(const src of sources){
      try{
        const _ac=new AbortController(),_tid=setTimeout(()=>_ac.abort(),5000);
        const r=await fetch(src.url,{signal:_ac.signal});
        clearTimeout(_tid);
        const d=await r.json();
        const result=src.parse(d);
        if(result && result.usd>0){
          metals[sym]={usd:result.usd,change:result.change,uzs:result.usd*USD_UZS,gram:result.usd/31.1035};
          found=true;
          break;
        }
      }catch(_){}
    }
    // 3. API ishlamasa - spot fallback
    if(!found){
      const fb=SPOT_FALLBACK[sym];
      metals[sym]={usd:fb.usd,change:fb.change,uzs:fb.usd*USD_UZS,gram:fb.usd/31.1035};
    }
  }

  METALS = metals;
  renderMetals();
}

    // Birlikka qarab asosiy narx

    const unitLbl  = isGram ? 'g' : 'oz';

    return`<div class="mtile ${m.cls}">
      <span class="mico">${MLOGO[sym]||sym}</span>
      <div class="msym">${sym} · ${mname(sym)}</div>

      <!-- Asosiy narx: tanlangan birlikda -->
      <div class="mp">$${isGram?gramUsd.toFixed(2):fmt(mainUsd,2)} <span class="ulbl">/${unitLbl}</span></div>

      <!-- UZS narxi -->
      <div class="muzs">${fmt(mainUzs)} <span style="opacity:.6">so'm/${unitLbl}</span></div>

      <!-- Trend + 7 kun -->
      <div style="margin:4px 0">${chgBadge}${wkBadge}</div>

      <div class="mgram">1${otherLbl} = $${isGram?fmt(otherUsd,2):gramUsd.toFixed(2)}</div>

// ── CALCULATOR ──
function qa(v){document.getElementById('amt').value=v;doCalc()}

function doSwap(){
  const fc=document.getElementById('fc');
  const tc=document.getElementById('tc');
  const tmp=fc.value; fc.value=tc.value; tc.value=tmp;
  doCalc();
}
function toUZS(a,c){
  if(c==='UZS')return a;
  if(CBU[c])return a*CBU[c].rate;
  if(CRYPTO[c])return a*CRYPTO[c].uzs;
  if(METALS[c])return a*METALS[c].uzs;
  return null;
}
function frUZS(a,c){
  if(c==='UZS')return a;
  if(CBU[c])return a/CBU[c].rate;
  if(CRYPTO[c])return a/CRYPTO[c].uzs;
  if(METALS[c])return a/METALS[c].uzs;
  return null;
}
function doCalc(){
  const a  = parseFloat(document.getElementById('amt').value)||0;
  const f  = document.getElementById('fc').value;
  const t  = document.getElementById('tc').value;
  const rc = document.getElementById('rescard');
  if(!a){rc.classList.remove('on');return}
  const uzs=toUZS(a,f); if(!uzs){rc.classList.remove('on');return}
  const cv =frUZS(uzs,t); if(cv===null){rc.classList.remove('on');return}
  const dp = cv<0.0001?8:cv<1?4:2;
  const r1 = frUZS(toUZS(1,f),t);
  document.getElementById('resfrom').textContent=`${fmt(a,2)} ${f}`;
  document.getElementById('resto').textContent=`${fmt(cv,dp)} ${t}`;
  document.getElementById('resrate').textContent=`1 ${f} = ${r1<0.0001?r1.toFixed(8):fmt(r1,4)} ${t}`;
  rc.classList.add('on');
}

// ── LOAD ALL ──
async function loadAll(){
  const btn=document.getElementById('refBtn');
  btn.classList.add('spin');
  document.getElementById('v-load').style.display='flex';document.getElementById('v-body').style.display='none';
  document.getElementById('c-load').style.display='flex';document.getElementById('c-body').style.display='none';
  document.getElementById('m-load').style.display='flex';document.getElementById('m-body').style.display='none';
  await Promise.all([loadCBU(),loadCrypto(),loadMetals()]);
  btn.classList.remove('spin');
  doCalc();
}
