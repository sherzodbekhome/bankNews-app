<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BankNews — Kurs va Kalkulyator</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #11141c;
    --card: #181d28;
    --border: #232938;
    --gold: #f0b429;
    --gold2: #ffd166;
    --green: #22c55e;
    --red: #ef4444;
    --blue: #3b82f6;
    --muted: #6b7280;
    --text: #e8eaf0;
    --text2: #9ca3af;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding-bottom: 80px;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #0f1420 0%, #1a1f2e 100%);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--gold), #ff8c00);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .logo-text {
    font-size: 16px;
    font-weight: 800;
    color: var(--gold);
    letter-spacing: -0.5px;
  }
  .update-time {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
  }
  .refresh-btn {
    background: var(--border);
    border: none;
    color: var(--text2);
    width: 32px; height: 32px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .refresh-btn:active { transform: scale(0.9); background: var(--gold); color: #000; }
  .refresh-btn.spinning { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Tabs */
  .tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex: 1;
    min-width: 80px;
    padding: 12px 8px;
    border: none;
    background: none;
    color: var(--muted);
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
    text-align: center;
  }
  .tab.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }
  .tab-icon { display: block; font-size: 18px; margin-bottom: 2px; }

  /* Content */
  .content { padding: 16px; }
  .section { display: none; }
  .section.active { display: block; }

  /* Cards */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
    animation: fadeUp 0.3s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Currency Row */
  .currency-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .currency-row:last-child { border-bottom: none; }
  .currency-left { display: flex; align-items: center; gap: 10px; }
  .currency-flag {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    background: var(--surface);
  }
  .currency-code {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
  }
  .currency-name {
    font-size: 11px;
    color: var(--muted);
    margin-top: 1px;
  }
  .currency-right { text-align: right; }
  .currency-rate {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }
  .currency-change {
    font-family: var(--mono);
    font-size: 11px;
    margin-top: 2px;
  }
  .up { color: var(--green); }
  .down { color: var(--red); }
  .neutral { color: var(--muted); }

  /* Crypto */
  .crypto-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .crypto-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    transition: border-color 0.2s;
  }
  .crypto-card:active { border-color: var(--gold); }
  .crypto-icon { font-size: 24px; margin-bottom: 6px; }
  .crypto-sym {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    color: var(--text2);
  }
  .crypto-usd {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    margin: 4px 0 2px;
  }
  .crypto-uzs {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
  }
  .crypto-change {
    font-family: var(--mono);
    font-size: 11px;
    margin-top: 4px;
    display: inline-block;
    padding: 2px 6px;
    border-radius: 4px;
  }
  .crypto-change.up { background: rgba(34,197,94,0.15); color: var(--green); }
  .crypto-change.down { background: rgba(239,68,68,0.15); color: var(--red); }

  /* Calculator */
  .calc-wrap { }
  .calc-display {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 12px;
    min-height: 100px;
  }
  .calc-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .calc-amount-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .calc-input {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-family: var(--mono);
    font-size: 20px;
    color: var(--text);
    outline: none;
    width: 100%;
  }
  .calc-input:focus { border-color: var(--gold); }
  .calc-currencies {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 8px;
    align-items: center;
    margin-bottom: 14px;
  }
  .calc-select {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    outline: none;
    width: 100%;
    cursor: pointer;
  }
  .calc-select:focus { border-color: var(--gold); }
  .swap-btn {
    background: var(--border);
    border: none;
    color: var(--gold);
    width: 36px; height: 36px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .swap-btn:active { transform: rotate(180deg); background: var(--gold); color: #000; }
  .calc-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--gold), #ff8c00);
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 800;
    color: #000;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .calc-btn:active { transform: scale(0.98); opacity: 0.9; }
  .calc-result {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-top: 12px;
    display: none;
    animation: fadeUp 0.3s ease;
  }
  .calc-result.show { display: block; }
  .result-from {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .result-to {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 4px;
  }
  .result-rate {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }
  .quick-amounts {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .quick-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.2s;
  }
  .quick-btn:active { background: var(--gold); color: #000; border-color: var(--gold); }

  /* Metals */
  .metals-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .metals-row:last-child { border-bottom: none; }
  .metal-left { display: flex; align-items: center; gap: 10px; }
  .metal-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .metal-name { font-size: 13px; font-weight: 600; }
  .metal-unit { font-size: 11px; color: var(--muted); }

  /* Loading */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    flex-direction: column;
    gap: 12px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .loading-text { color: var(--muted); font-size: 13px; }

  /* Bottom nav */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 8px 0;
    z-index: 100;
  }
  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 6px;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--muted);
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 600;
    transition: color 0.2s;
  }
  .nav-item.active { color: var(--gold); }
  .nav-item .nav-icon { font-size: 20px; }

  /* Alert badge */
  .badge {
    display: inline-block;
    background: var(--gold);
    color: #000;
    font-size: 9px;
    font-weight: 800;
    padding: 2px 6px;
    border-radius: 20px;
    margin-left: 6px;
    vertical-align: middle;
  }

  /* Summary bar */
  .summary-bar {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
    margin-bottom: 14px;
  }
  .summary-bar::-webkit-scrollbar { display: none; }
  .summary-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 12px;
    white-space: nowrap;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .summary-chip strong { color: var(--text); }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">🏦</div>
      <div>
        <div class="logo-text">BankNews</div>
      </div>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="loadAllData()">↻</button>
  </div>
  <div class="update-time" id="updateTime">Yuklanmoqda...</div>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('currency', this)">
    <span class="tab-icon">💱</span>Valyuta
  </button>
  <button class="tab" onclick="switchTab('crypto', this)">
    <span class="tab-icon">₿</span>Kripto
  </button>
  <button class="tab" onclick="switchTab('calc', this)">
    <span class="tab-icon">🧮</span>Kalkulyator
  </button>
  <button class="tab" onclick="switchTab('metals', this)">
    <span class="tab-icon">🥇</span>Metallar
  </button>
</div>

<!-- Content -->
<div class="content">

  <!-- VALYUTA -->
  <div class="section active" id="section-currency">
    <div id="currency-loading" class="loading">
      <div class="spinner"></div>
      <div class="loading-text">Kurslar yuklanmoqda...</div>
    </div>
    <div id="currency-content" style="display:none">
      <div class="summary-bar" id="summaryBar"></div>
      <div class="card">
        <div class="card-title">📊 Markaziy Bank Kurslari</div>
        <div id="currencyList"></div>
      </div>
    </div>
  </div>

  <!-- KRIPTO -->
  <div class="section" id="section-crypto">
    <div id="crypto-loading" class="loading">
      <div class="spinner"></div>
      <div class="loading-text">Kripto narxlar yuklanmoqda...</div>
    </div>
    <div id="crypto-content" style="display:none">
      <div class="card">
        <div class="card-title">🔥 Kripto Narxlar (USD)</div>
        <div class="crypto-grid" id="cryptoGrid"></div>
      </div>
      <div class="card">
        <div class="card-title">🇺🇿 So'm da narxlar (UZS)</div>
        <div id="cryptoUZS"></div>
      </div>
    </div>
  </div>

  <!-- KALKULYATOR -->
  <div class="section" id="section-calc">
    <div class="card calc-wrap">
      <div class="card-title">🧮 Valyuta Kalkulyatori</div>
      <div class="calc-label">Miqdor</div>
      <div class="calc-amount-row">
        <input class="calc-input" type="number" id="calcAmount" value="100" placeholder="0" oninput="calculate()">
      </div>
      <div class="quick-amounts">
        <button class="quick-btn" onclick="setAmount(1)">1</button>
        <button class="quick-btn" onclick="setAmount(10)">10</button>
        <button class="quick-btn" onclick="setAmount(100)">100</button>
        <button class="quick-btn" onclick="setAmount(1000)">1 000</button>
        <button class="quick-btn" onclick="setAmount(10000)">10 000</button>
      </div>
      <div class="calc-label">Valyuta</div>
      <div class="calc-currencies">
        <select class="calc-select" id="fromCurr" onchange="calculate()">
          <option value="USD">🇺🇸 USD</option>
          <option value="EUR">🇪🇺 EUR</option>
          <option value="RUB">🇷🇺 RUB</option>
          <option value="GBP">🇬🇧 GBP</option>
          <option value="CNY">🇨🇳 CNY</option>
          <option value="KZT">🇰🇿 KZT</option>
          <option value="UZS">🇺🇿 UZS</option>
          <option value="BTC">₿ BTC</option>
          <option value="ETH">⟠ ETH</option>
          <option value="USDT">💵 USDT</option>
          <option value="TON">💎 TON</option>
          <option value="SOL">◎ SOL</option>
        </select>
        <button class="swap-btn" onclick="swapCurrencies()">⇄</button>
        <select class="calc-select" id="toCurr" onchange="calculate()">
          <option value="UZS">🇺🇿 UZS</option>
          <option value="USD">🇺🇸 USD</option>
          <option value="EUR">🇪🇺 EUR</option>
          <option value="RUB">🇷🇺 RUB</option>
          <option value="GBP">🇬🇧 GBP</option>
          <option value="CNY">🇨🇳 CNY</option>
          <option value="KZT">🇰🇿 KZT</option>
          <option value="BTC">₿ BTC</option>
          <option value="ETH">⟠ ETH</option>
          <option value="USDT">💵 USDT</option>
          <option value="TON">💎 TON</option>
          <option value="SOL">◎ SOL</option>
        </select>
      </div>
      <button class="calc-btn" onclick="calculate()">Hisoblash</button>
      <div class="calc-result" id="calcResult">
        <div class="result-from" id="resultFrom"></div>
        <div class="result-to" id="resultTo"></div>
        <div class="result-rate" id="resultRate"></div>
      </div>
    </div>
  </div>

  <!-- METALLAR -->
  <div class="section" id="section-metals">
    <div id="metals-loading" class="loading">
      <div class="spinner"></div>
      <div class="loading-text">Metallar yuklanmoqda...</div>
    </div>
    <div id="metals-content" style="display:none">
      <div class="card">
        <div class="card-title">🥇 Qimmatbaho Metallar</div>
        <div id="metalsList"></div>
      </div>
    </div>
  </div>

</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <button class="nav-item active" onclick="switchTab('currency', null, this)">
    <span class="nav-icon">💱</span>Valyuta
  </button>
  <button class="nav-item" onclick="switchTab('crypto', null, this)">
    <span class="nav-icon">₿</span>Kripto
  </button>
  <button class="nav-item" onclick="switchTab('calc', null, this)">
    <span class="nav-icon">🧮</span>Kalkulyator
  </button>
  <button class="nav-item" onclick="switchTab('metals', null, this)">
    <span class="nav-icon">🥇</span>Metallar
  </button>
</div>

<script>
// Telegram Web App init
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.setHeaderColor('#0a0c10');
  tg.setBackgroundColor('#0a0c10');
}

// Global state
let rates = {};      // CBU rates (UZS per 1 unit)
let cryptoData = {}; // CoinGecko data
let usdRate = 12500; // fallback

const FLAGS = {
  USD:'🇺🇸', EUR:'🇪🇺', RUB:'🇷🇺', GBP:'🇬🇧',
  CNY:'🇨🇳', KZT:'🇰🇿', TRY:'🇹🇷', JPY:'🇯🇵',
  CHF:'🇨🇭', UZS:'🇺🇿'
};
const NAMES = {
  USD:'AQSH dollari', EUR:'Evro', RUB:'Rossiya rubli',
  GBP:'Britaniya funt', CNY:'Xitoy yuani', KZT:'Qozog\'iston tengesi',
  TRY:'Turk lirasi', JPY:'Yaponiya iyenasi', CHF:'Shveytsariya franki'
};
const CRYPTO_ICONS = {
  BTC:'₿', ETH:'⟠', TON:'💎', BNB:'🟡', SOL:'◎', USDT:'💵'
};
const CRYPTO_IDS = {
  bitcoin:'BTC', ethereum:'ETH', 'the-open-network':'TON',
  binancecoin:'BNB', solana:'SOL', tether:'USDT'
};

// ─── Tab switching ─────────────────────────────────────────
function switchTab(name, tabEl, navEl) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

  document.getElementById('section-' + name).classList.add('active');
  if (tabEl) tabEl.classList.add('active');
  if (navEl) navEl.classList.add('active');

  // sync tabs & nav
  const tabs = document.querySelectorAll('.tab');
  const navs = document.querySelectorAll('.nav-item');
  const idx = ['currency','crypto','calc','metals'].indexOf(name);
  if (tabs[idx]) tabs[idx].classList.add('active');
  if (navs[idx]) navs[idx].classList.add('active');
}

// ─── Format numbers ────────────────────────────────────────
function fmt(n, dec=0) {
  if (n >= 1e9) return (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(2) + 'M';
  return n.toLocaleString('uz-UZ', {minimumFractionDigits: dec, maximumFractionDigits: dec});
}

function changeClass(v) { return v > 0 ? 'up' : v < 0 ? 'down' : 'neutral'; }
function changeArrow(v) { return v > 0 ? '▲' : v < 0 ? '▼' : '─'; }

// ─── Load CBU rates ────────────────────────────────────────
async function loadCBU() {
  try {
    const r = await fetch('https://cbu.uz/uz/arkhiv-kursov-valyut/json/');
    const data = await r.json();
    const want = ['USD','EUR','RUB','GBP','CNY','KZT','TRY','JPY','CHF'];
    rates = {};
    data.forEach(item => {
      if (want.includes(item.Ccy)) {
        rates[item.Ccy] = {
          rate: parseFloat(item.Rate),
          diff: parseFloat(item.Diff || 0),
          name: NAMES[item.Ccy] || item.CcyNm_UZ
        };
      }
    });
    if (rates.USD) usdRate = rates.USD.rate;
    renderCurrency();
  } catch(e) {
    document.getElementById('currency-loading').innerHTML =
      '<div class="loading-text">❌ Kurslar yuklanmadi. Internet tekshiring.</div>';
  }
}

function renderCurrency() {
  const loading = document.getElementById('currency-loading');
  const content = document.getElementById('currency-content');
  loading.style.display = 'none';
  content.style.display = 'block';

  // Summary bar
  const bar = document.getElementById('summaryBar');
  bar.innerHTML = ['USD','EUR','RUB'].map(c => {
    if (!rates[c]) return '';
    const d = rates[c];
    const cls = changeClass(d.diff);
    return `<div class="summary-chip">${FLAGS[c]} <strong>${c}</strong> ${fmt(d.rate)} <span class="${cls}">${changeArrow(d.diff)}</span></div>`;
  }).join('');

  // List
  const list = document.getElementById('currencyList');
  list.innerHTML = Object.entries(rates).map(([code, info]) => {
    const cls = changeClass(info.diff);
    return `
      <div class="currency-row">
        <div class="currency-left">
          <div class="currency-flag">${FLAGS[code] || '🏳'}</div>
          <div>
            <div class="currency-code">${code}</div>
            <div class="currency-name">${info.name}</div>
          </div>
        </div>
        <div class="currency-right">
          <div class="currency-rate">${fmt(info.rate)} so'm</div>
          <div class="currency-change ${cls}">${changeArrow(info.diff)} ${Math.abs(info.diff).toFixed(2)}</div>
        </div>
      </div>`;
  }).join('');
}

// ─── Load Crypto ───────────────────────────────────────────
async function loadCrypto() {
  try {
    const ids = 'bitcoin,ethereum,the-open-network,binancecoin,solana,tether';
    const r = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`);
    const data = await r.json();
    cryptoData = {};
    Object.entries(CRYPTO_IDS).forEach(([id, sym]) => {
      if (data[id]) {
        cryptoData[sym] = {
          usd: data[id].usd,
          change: data[id].usd_24h_change || 0,
          uzs: data[id].usd * usdRate
        };
      }
    });
    renderCrypto();
  } catch(e) {
    // Fallback static data
    cryptoData = {
      BTC:  { usd: 97000, change: 1.2,  uzs: 97000 * usdRate },
      ETH:  { usd: 3500,  change: -0.8, uzs: 3500  * usdRate },
      TON:  { usd: 2.6,   change: 0.5,  uzs: 2.6   * usdRate },
      USDT: { usd: 1.0,   change: 0.01, uzs: usdRate },
      SOL:  { usd: 149,   change: 2.1,  uzs: 149   * usdRate },
      BNB:  { usd: 610,   change: -1.1, uzs: 610   * usdRate },
    };
    renderCrypto();
  }
}

function renderCrypto() {
  document.getElementById('crypto-loading').style.display = 'none';
  document.getElementById('crypto-content').style.display = 'block';

  const grid = document.getElementById('cryptoGrid');
  grid.innerHTML = Object.entries(cryptoData).map(([sym, d]) => {
    const cls = changeClass(d.change);
    const priceStr = d.usd >= 1 ? '$' + fmt(d.usd, 2) : '$' + d.usd.toFixed(4);
    return `
      <div class="crypto-card">
        <div class="crypto-icon">${CRYPTO_ICONS[sym] || '🪙'}</div>
        <div class="crypto-sym">${sym}</div>
        <div class="crypto-usd">${priceStr}</div>
        <div class="crypto-uzs">${fmt(d.uzs)} UZS</div>
        <span class="crypto-change ${cls}">${changeArrow(d.change)} ${Math.abs(d.change).toFixed(2)}%</span>
      </div>`;
  }).join('');

  // UZS table
  const uzsDiv = document.getElementById('cryptoUZS');
  uzsDiv.innerHTML = Object.entries(cryptoData).map(([sym, d]) => {
    const cls = changeClass(d.change);
    return `
      <div class="currency-row">
        <div class="currency-left">
          <div class="currency-flag">${CRYPTO_ICONS[sym] || '🪙'}</div>
          <div>
            <div class="currency-code">${sym}</div>
          </div>
        </div>
        <div class="currency-right">
          <div class="currency-rate">${fmt(d.uzs)} so'm</div>
          <div class="currency-change ${cls}">${changeArrow(d.change)} ${Math.abs(d.change).toFixed(2)}%</div>
        </div>
      </div>`;
  }).join('');
}

// ─── Calculator ────────────────────────────────────────────
function setAmount(n) {
  document.getElementById('calcAmount').value = n;
  calculate();
}

function swapCurrencies() {
  const f = document.getElementById('fromCurr');
  const t = document.getElementById('toCurr');
  [f.value, t.value] = [t.value, f.value];
  calculate();
}

function toUZS(amount, currency) {
  if (currency === 'UZS') return amount;
  if (rates[currency]) return amount * rates[currency].rate;
  if (cryptoData[currency]) return amount * cryptoData[currency].uzs;
  return null;
}

function fromUZS(amount, currency) {
  if (currency === 'UZS') return amount;
  if (rates[currency]) return amount / rates[currency].rate;
  if (cryptoData[currency]) return amount / cryptoData[currency].uzs;
  return null;
}

function calculate() {
  const amount = parseFloat(document.getElementById('calcAmount').value) || 0;
  const from = document.getElementById('fromCurr').value;
  const to = document.getElementById('toCurr').value;
  const result = document.getElementById('calcResult');

  if (!amount) { result.classList.remove('show'); return; }

  const uzs = toUZS(amount, from);
  if (!uzs) { result.classList.remove('show'); return; }

  const converted = fromUZS(uzs, to);
  if (converted === null) { result.classList.remove('show'); return; }

  const isSmall = converted < 0.001;
  const isBig = converted > 999999;
  const displayVal = isSmall ? converted.toFixed(8) : isBig ? fmt(converted, 0) : fmt(converted, 2);

  document.getElementById('resultFrom').textContent = `${fmt(amount, 2)} ${from}`;
  document.getElementById('resultTo').textContent = `${displayVal} ${to}`;

  // Rate
  const rate1 = fromUZS(toUZS(1, from), to);
  const rateStr = rate1 < 0.0001 ? rate1.toFixed(8) : fmt(rate1, 4);
  document.getElementById('resultRate').textContent = `1 ${from} = ${rateStr} ${to}`;

  result.classList.add('show');
}

// ─── Refresh ───────────────────────────────────────────────
async function loadAllData() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');

  document.getElementById('currency-loading').style.display = 'flex';
  document.getElementById('currency-content').style.display = 'none';
  document.getElementById('crypto-loading').style.display = 'flex';
  document.getElementById('crypto-content').style.display = 'none';
  document.getElementById('metals-loading').style.display = 'flex';
  document.getElementById('metals-content').style.display = 'none';

  await Promise.all([loadCBU(), loadCrypto(), loadMetals()]);

  const now = new Date();
  document.getElementById('updateTime').textContent =
    `Yangilandi: ${now.toLocaleTimeString('uz-UZ')}`;

  btn.classList.remove('spinning');
  calculate();
}

// Init
loadAllData();
